    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #1a1a2e;
            background: #fafbff;
            -webkit-font-smoothing: antialiased;
        }
        header {
            position: fixed; top: 0; width: 100%;

            max-width: 600px; margin: 0 auto;
            padding: 140px 24px 100px;
            text-align: center;
        }
        h1 { font-size: 1.6rem; font-weight: 900; margin-bottom: 16px; }
        p { color: #666; line-height: 1.8; font-size: 0.95rem; margin-bottom: 12px; }
        a.email-link {
            color: #4A90E2; text-decoration: none; font-weight: 500;
        }
        a.email-link:hover { text-decoration: underline; }
        footer {
            background: #1a1a2e; color: rgba(255,255,255,0.6);
            text-align: center; padding: 40px 24px; font-size: 0.85rem;
        }
        footer a { color: rgba(255,255,255,0.8); text-decoration: none; margin: 0 12px; }

<header>
